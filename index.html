<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duodoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Duodoku</h1>
    
    <div id="lobby-container">
        <div id="username-section">
            <input type="text" id="username-input" placeholder="Tu nombre de jugador" maxlength="15">
            <button id="save-user-btn">Guardar Nombre</button>
        </div>
        <h2 id="welcome-msg" style="display:none;">Hola, <span id="display-name"></span></h2>
        <button id="find-match-btn" style="display:none;">Buscar Partida</button>
        <p id="status-msg"></p>
    </div>

    <div id="game-container" style="display: none;">
        <div id="boards-wrapper">
            <div class="spacer"></div>

            <div id="main-player-section">
                <div class="match-info">Tú: <span id="player1-name"></span></div>
                
                <div class="hp-container">
                    <div id="player-hp-bar" class="hp-fill"></div>
                    <div class="hp-text"><span id="player-hp-val">150</span> / 150 HP</div>
                </div>

                <div id="sudoku-board"></div>
                <button id="leave-match-btn">Abandonar Partida</button>
            </div>

            <div id="opponent-section">
                <div class="match-info">Rival: <span id="player2-name"></span></div>
                
                <div class="hp-container mini">
                    <div id="opponent-hp-bar" class="hp-fill"></div>
                </div>

                <div id="opponent-board"></div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
